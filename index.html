<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="List Master" />
    <link rel="apple-touch-icon" href="/ListMaster/icon-192.png" />
    <meta name="theme-color" content="#080f0c" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#edf3f0" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/ListMaster/icon-192.png" />
    <title>List Master</title>

    <!-- Inline theme initializer — runs before first paint to prevent theme flash -->
    <script>
      (function () {
        var mode = localStorage.getItem("appearanceMode") || "system";
        var lightBg = "#edf3f0";
        var darkBg = "#080f0c";

        if (mode === "light" || mode === "dark") {
          document.documentElement.setAttribute("data-theme", mode);
          var bg = mode === "dark" ? darkBg : lightBg;
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) {
            metas[i].setAttribute("content", bg);
          }
        }
        // 'system' mode: do nothing — the media-query meta tags handle it
      })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S49MDQS6JK"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-S49MDQS6JK');
    </script>
    <script type="module" crossorigin src="/ListMaster/assets/index-DWJ7eYK1.js"></script>
    <link rel="stylesheet" crossorigin href="/ListMaster/assets/index-CGZhyYwQ.css">
  <link rel="manifest" href="/ListMaster/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/ListMaster/registerSW.js"></script></head>
  <body>
    <div id="root"></div>

    <!-- Track PWA installs via the appinstalled event -->
    <script>
      window.addEventListener('appinstalled', function () {
        gtag('event', 'pwa_installed', {
          event_category: 'PWA',
          event_label: 'Add to Home Screen'
        });
      });
    </script>
  </body>
</html>
